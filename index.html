<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Review | Fricção Zero</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%231d4ed8'/></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Função utilitária para colocar apenas a primeira letra em maiúsculo
        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
        }

        function gerarDisparo() {
            // 1. Pega os dados e limpa
            let nomeInput = document.getElementById('nome').value.trim();
            let telefoneBruto = document.getElementById('telefone').value.replace(/\D/g, ''); 
            
            // 2. Validações básicas
            if(!nomeInput || !telefoneBruto) {
                alert("Por favor, preencha o nome e o WhatsApp da paciente.");
                return;
            }

            // 3. Processa os dados (Corrige maiúsculas e adiciona 55)
            const nomeFormatado = capitalize(nomeInput);
            
            let telefoneFinal = telefoneBruto;
            if (telefoneFinal.length === 11 || telefoneFinal.length === 10) {
                telefoneFinal = "55" + telefoneFinal;
            }

            // --- O SEGREDO DO SUCESSO ---
            // Cole aqui o PLACE ID da clínica (daquele jeito que te ensinei).
            // Esse link abre DIRETO na caixinha de 5 estrelas.
            const placeIdClinica = "ChIJBTM3zeGDmQARyRhhkzvD4sg"; 
            const linkGoogleEstrelas = `https://search.google.com/local/writereview?placeid=${placeIdClinica}`;

            // --- O TEXTO PERFEITO, LEVE E DIRETO ---
            const texto = `Olá, ${nomeFormatado}! 💙\nComo foi sua experiência na Clínica Blue hoje?\n\nSe desejar, será muito especial para nós que compartilhe sua avaliação no Google clicando aqui:\n${linkGoogleEstrelas}\n\nObrigada por nos permitir cuidar de você.`;

            // 4. Cria a URL do WhatsApp Web e abre
            const textoCodificado = encodeURIComponent(texto);
            const urlWhatsApp = `https://wa.me/${telefoneFinal}?text=${textoCodificado}`;

            window.open(urlWhatsApp, '_blank');
        }
    </script>
</head>
<body class="bg-slate-100 flex items-center justify-center h-screen font-sans">
    
    <div class="bg-white p-10 rounded-3xl shadow-lg w-full max-w-md border border-slate-100">
        
        <div class="text-center mb-10">
            <h1 class="text-2xl font-bold text-blue-900 tracking-tighter">Clínica Blue</h1>
            <p class="text-slate-500 text-sm mt-1">Gerador de avaliação direta (Google)</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block mb-1 text-sm font-semibold text-slate-700">Nome da paciente</label>
                <input type="text" id="nome" placeholder="Ex: Letícia" class="w-full border border-slate-300 rounded-xl p-4 outline-none focus:ring-2 focus:ring-blue-800 transition">
            </div>

            <div>
                <label class="block mb-1 text-sm font-semibold text-slate-700">WhatsApp (com DDD)</label>
                <input type="text" id="telefone" placeholder="Ex: 21987654321" class="w-full border border-slate-300 rounded-xl p-4 outline-none focus:ring-2 focus:ring-blue-800 transition">
            </div>

            <button onclick="gerarDisparo()" class="w-full bg-blue-700 text-white font-bold py-4 px-4 rounded-xl hover:bg-blue-800 transition duration-200 mt-6 shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                Enviar mensagem oficial
            </button>
        </div>
    </div>

</body>
</html>

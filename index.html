<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Concierge | Disparo Oficial</title>
    
    <link rel="icon" href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
    <ellipse cx='50' cy='80' rx='45' ry='12' fill='%23dfe6ee'/>
    <ellipse cx='30' cy='75' rx='25' ry='8' fill='%23e9eef5'/>
    <ellipse cx='70' cy='75' rx='25' ry='8' fill='%23e9eef5'/>
    <path d='M10 80 L50 20 L90 80 Z' fill='%232c3e50'/>
    <rect x='48' y='28' width='4' height='10' fill='%23ffffff'/>
    <rect x='40' y='30' width='20' height='3' fill='%23ffffff'/>
    <circle cx='50' cy='26' r='2' fill='%23ffffff'/>
    </svg>">

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen font-sans">
    
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-900 tracking-tight">Clínica Blue</h1>
            <p class="text-slate-400 text-sm mt-1">Disparo de Pesquisa de Satisfação</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block mb-1 text-sm font-semibold text-slate-700">Nome da Paciente</label>
                <input type="text" id="nome" placeholder="Ex: Letícia" class="w-full border border-slate-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-800 transition">
            </div>

            <div>
                <label class="block mb-1 text-sm font-semibold text-slate-700">WhatsApp (com DDD)</label>
                <input type="text" id="telefone" placeholder="Ex: 21987654321" class="w-full border border-slate-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-800 transition">
            </div>

            <button onclick="gerarMensagem()" class="w-full bg-blue-900 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-800 transition duration-200 mt-4 shadow-md">
                Disparar WhatsApp Oficial
            </button>
        </div>
    </div>

    <script>
        function gerarMensagem() {
            const nome = document.getElementById('nome').value.trim();
            const telefoneBruto = document.getElementById('telefone').value.replace(/\D/g, ''); 
            
            // Adiciona o DDI do Brasil (55) automaticamente se a Helen esquecer
            let telefoneFinal = telefoneBruto;
            if (telefoneFinal.length === 11 || telefoneFinal.length === 10) {
                telefoneFinal = "55" + telefoneFinal;
            }

            // O link do segundo site Vercel (A página da pesquisa/filtro que vamos criar)
            const linkPesquisa = "https://sua-pesquisa-blue.vercel.app"; 

            if(!nome || !telefoneFinal) {
                alert("Por favor, preencha o nome e o número.");
                return;
            }

            // O texto aprovado pelo Dr. Rafael
            const texto = `Olá, ${nome}! 💙\n\nEsperamos que sua experiência na Clínica Blue tenha sido excepcional.\n\nPara continuarmos oferecendo o melhor cuidado, convidamos você a responder uma breve pesquisa de satisfação:\n${linkPesquisa}`;

            const textoCodificado = encodeURIComponent(texto);
            const urlWhatsApp = `https://wa.me/${telefoneFinal}?text=${textoCodificado}`;

            window.open(urlWhatsApp, '_blank');
        }
    </script>
</body>
</html>

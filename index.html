<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Intelligence | Patient Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background: #fff; color: #000; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input, textarea { border-color: #e5e7eb !important; transition: all 0.2s; }
        input:focus, textarea:focus { border-color: #000 !important; ring: 0 !important; }
        .card-evolution { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden">

    <main class="w-full md:w-[450px] p-8 md:p-12 overflow-y-auto border-r border-zinc-100 no-scrollbar">
        <header class="mb-10">
            <h1 class="text-xs font-bold uppercase tracking-[0.3em] text-zinc-300">Blue Intelligence</h1>
            <p class="text-xl font-light text-zinc-900 mt-1">Registro de Evolução</p>
        </header>

        <div class="space-y-8">
            <div class="grid grid-cols-1 gap-6">
                <input type="text" id="nome" placeholder="Nome da Paciente" class="w-full border-b py-2 outline-none text-lg font-light placeholder:text-zinc-200">
                <input type="text" id="telefone" placeholder="WhatsApp (DDD + Número)" class="w-full border-b py-2 outline-none text-lg font-light placeholder:text-zinc-200">
            </div>

            <div class="grid grid-cols-2 gap-4 text-[10px] font-bold uppercase tracking-widest text-zinc-400">
                <label class="flex items-center gap-2 cursor-pointer hover:text-black transition">
                    <input type="checkbox" id="cirurgia" class="w-3 h-3 accent-black"> Fechou Cirurgia
                </label>
                <label class="flex items-center gap-2 cursor-pointer hover:text-black transition">
                    <input type="checkbox" id="pago2" class="w-3 h-3 accent-black"> 2ª Parte Paga
                </label>
                <label class="flex items-center gap-2 cursor-pointer hover:text-black transition">
                    <input type="checkbox" id="injetavel" class="w-3 h-3 accent-black"> Injetável Realizado
                </label>
                <label class="flex items-center gap-2 cursor-pointer hover:text-black transition">
                    <input type="checkbox" id="pendente" class="w-3 h-3 accent-black"> Exames Pendentes
                </label>
            </div>

            <div>
                <label class="text-[9px] font-bold uppercase text-zinc-300 tracking-widest block mb-2">Notas de Evolução / Dúvidas</label>
                <textarea id="notas" rows="4" placeholder="Descreva a evolução ou pendências da paciente..." class="w-full border rounded-sm p-4 text-sm font-light leading-relaxed outline-none resize-none"></textarea>
            </div>

            <button onclick="registrar()" class="w-full bg-black text-white py-5 text-[10px] font-bold uppercase tracking-[0.2em] hover:bg-zinc-800 transition-all shadow-xl active:scale-95">
                Arquivar e Enviar Review
            </button>
        </div>
    </main>

    <aside class="flex-1 bg-zinc-50 p-8 md:p-12 overflow-y-auto no-scrollbar">
        <div class="flex justify-between items-end mb-8">
            <h3 class="text-[10px] font-bold uppercase text-zinc-400 tracking-widest">Histórico de Evolução</h3>
            <button onclick="limparBanco()" class="text-[9px] text-zinc-300 hover:text-red-400 transition uppercase font-bold tracking-tighter">Limpar Banco</button>
        </div>
        
        <div id="feed" class="space-y-4">
            </div>
    </aside>

    <script>
        // Carrega dados ao abrir
        window.onload = carregarFeed;

        function registrar() {
            const nome = document.getElementById('nome').value.trim();
            const tel = document.getElementById('telefone').value.replace(/\D/g, '');
            const notas = document.getElementById('notas').value.trim();
            
            if(!nome || !tel) return alert("Nome e WhatsApp são obrigatórios.");

            const data = {
                id: Date.now(),
                nome: nome,
                tel: tel,
                notas: notas,
                cirurgia: document.getElementById('cirurgia').checked,
                pago2: document.getElementById('pago2').checked,
                injetavel: document.getElementById('injetavel').checked,
                pendente: document.getElementById('pendente').checked,
                hora: new Date().toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' })
            };

            // Salva no LocalStorage (Banco de Dados Grátis)
            let pacientes = JSON.parse(localStorage.getItem('blue_db') || '[]');
            pacientes.unshift(data);
            localStorage.setItem('blue_db', JSON.stringify(pacientes));

            // Lógica Review 50/50
            const perfis = ["ChIJBTM3zeGDmQARyRhhkzvD4sg", "ChIJ781BVf2DmQARU2cPXLuuOHQ"];
            let idx = localStorage.getItem('blue_idx') || 0;
            const link = `https://search.google.com/local/writereview?placeid=${perfis[idx]}&review=5`;
            localStorage.setItem('blue_idx', (parseInt(idx) + 1) % 2);

            // Mensagem Direct
            const msg = `Olá, ${nome.split(' ')[0]}.\n\nFoi um prazer acompanhar sua evolução hoje. Se desejar registrar sua experiência conosco no Google, basta acessar:\n\n${link}\n\nAtenciosamente,\nEquipe Clínica Blue.`;
            
            window.open(`https://wa.me/${tel.length <= 11 ? '55'+tel : tel}?text=${encodeURIComponent(msg)}`, '_blank');
            
            resetCampos();
            carregarFeed();
        }

        function carregarFeed() {
            const feed = document.getElementById('feed');
            const pacientes = JSON.parse(localStorage.getItem('blue_db') || '[]');
            feed.innerHTML = pacientes.length ? '' : '<p class="text-zinc-300 italic text-sm">Nenhum registro hoje.</p>';

            pacientes.forEach(p => {
                const card = document.createElement('div');
                card.className = "card-evolution bg-white border border-zinc-100 p-6 rounded-sm shadow-sm hover:shadow-md transition-shadow";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-sm font-medium text-black">${p.nome}</span>
                        <span class="text-[9px] text-zinc-300 font-mono">${p.hora}</span>
                    </div>
                    <div class="flex flex-wrap gap-2 mb-4">
                        ${p.cirurgia ? '<span class="text-[8px] bg-zinc-900 text-white px-2 py-0.5 font-bold uppercase tracking-tighter">Cirurgia</span>' : ''}
                        ${p.pago2 ? '<span class="text-[8px] bg-green-50 text-green-600 border border-green-100 px-2 py-0.5 font-bold uppercase tracking-tighter">Fin. Pago</span>' : ''}
                        ${p.injetavel ? '<span class="text-[8px] bg-blue-50 text-blue-600 border border-blue-100 px-2 py-0.5 font-bold uppercase tracking-tighter">Injetável</span>' : ''}
                        ${p.pendente ? '<span class="text-[8px] bg-red-50 text-red-600 border border-red-100 px-2 py-0.5 font-bold uppercase tracking-tighter text-red-500">Exames Pendentes</span>' : ''}
                    </div>
                    <p class="text-xs text-zinc-500 font-light leading-relaxed border-t border-zinc-50 pt-3">${p.notas || 'Sem notas de evolução.'}</p>
                `;
                feed.appendChild(card);
            });
        }

        function resetCampos() {
            document.getElementById('nome').value = '';
            document.getElementById('telefone').value = '';
            document.getElementById('notas').value = '';
            document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
        }

        function limparBanco() { if(confirm("Deseja apagar todos os registros de hoje?")) { localStorage.removeItem('blue_db'); carregarFeed(); } }
    </script>
</body>
</html>
